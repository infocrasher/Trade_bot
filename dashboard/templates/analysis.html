<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse — ICTBot Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e1a;
            color: #e0e6f0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background: #111827;
            border-bottom: 1px solid #1e293b;
            padding: 0 24px;
            height: 52px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .navbar .brand {
            color: #3b82f6;
            font-weight: 700;
            font-size: 16px;
            text-decoration: none;
        }

        .navbar a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .navbar a:hover {
            color: #e2e8f0;
            background: #1e293b;
        }

        .navbar .back {
            color: #3b82f6;
        }

        .container {
            padding: 24px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* HEADER TRADE */
        .trade-header {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .trade-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .pair-name {
            font-size: 28px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .direction-badge {
            padding: 4px 14px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
        }

        .direction-badge.buy {
            background: #172554;
            color: #3b82f6;
        }

        .direction-badge.sell {
            background: #2d1b4e;
            color: #a78bfa;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.active {
            background: #14532d;
            color: #22c55e;
        }

        .status-badge.closed {
            background: #1e293b;
            color: #64748b;
        }

        .status-badge.pending {
            background: #1c1917;
            color: #f59e0b;
        }

        .trade-meta {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .meta-item {
            text-align: center;
        }

        .meta-item .val {
            font-size: 20px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .meta-item .val.green {
            color: #22c55e;
        }

        .meta-item .val.red {
            color: #ef4444;
        }

        .meta-item .lbl {
            font-size: 11px;
            color: #475569;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* GRID 2 COLS */
        .grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 800px) {
            .grid2 {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #1e293b;
        }

        /* SCORE BARS */
        .score-item {
            margin-bottom: 14px;
        }

        .score-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .score-name {
            font-size: 13px;
            color: #94a3b8;
        }

        .score-val {
            font-size: 13px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .score-bar {
            height: 8px;
            background: #1e293b;
            border-radius: 4px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.6s ease;
        }

        .score-fill.high {
            background: #22c55e;
        }

        .score-fill.medium {
            background: #f59e0b;
        }

        .score-fill.low {
            background: #ef4444;
        }

        /* GLOBAL SCORE RING */
        .score-ring-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
        }

        .score-ring {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 12px;
        }

        .score-ring svg {
            transform: rotate(-90deg);
        }

        .score-ring .score-text {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .score-ring .score-number {
            font-size: 28px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .score-ring .score-label {
            font-size: 11px;
            color: #475569;
        }

        /* PRIX LEVELS */
        .price-levels {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-radius: 8px;
            background: #0f172a;
        }

        .price-row .plabel {
            font-size: 12px;
            color: #64748b;
        }

        .price-row .pvalue {
            font-size: 15px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .price-row.entry {
            border-left: 3px solid #3b82f6;
        }

        .price-row.sl {
            border-left: 3px solid #ef4444;
        }

        .price-row.tp1 {
            border-left: 3px solid #22c55e;
        }

        .price-row.tp2 {
            border-left: 3px solid #10b981;
        }

        .price-row.rr {
            border-left: 3px solid #f59e0b;
        }

        /* NARRATIVE */
        .narrative-text {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.7;
            white-space: pre-wrap;
            background: #0f172a;
            border-radius: 8px;
            padding: 16px;
        }

        /* CHECKLIST */
        .checklist-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #0f172a;
            font-size: 13px;
        }

        .checklist-item:last-child {
            border-bottom: none;
        }

        .check-icon {
            font-size: 16px;
            flex-shrink: 0;
        }

        .check-text {
            color: #94a3b8;
        }

        /* RED FLAGS */
        .red-flag {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 10px 14px;
            background: #450a0a20;
            border: 1px solid #7f1d1d40;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #fca5a5;
        }

        /* VERDICT */
        .verdict-box {
            padding: 16px 20px;
            border-radius: 10px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .verdict-box.validated {
            background: #14532d20;
            border: 1px solid #15803d40;
        }

        .verdict-box.rejected {
            background: #450a0a20;
            border: 1px solid #7f1d1d40;
        }

        .verdict-box.skip {
            background: #1e293b;
            border: 1px solid #334155;
        }

        .verdict-icon {
            font-size: 24px;
        }

        .verdict-text .title {
            font-size: 16px;
            font-weight: 700;
        }

        .verdict-text .title.green {
            color: #22c55e;
        }

        .verdict-text .title.red {
            color: #ef4444;
        }

        .verdict-text .title.gray {
            color: #64748b;
        }

        .verdict-text .sub {
            font-size: 12px;
            color: #475569;
            margin-top: 2px;
        }

        .loading {
            text-align: center;
            padding: 80px;
            color: #475569;
            font-size: 16px;
        }

        .error {
            text-align: center;
            padding: 80px;
            color: #ef4444;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="/" class="brand">📈 ICTBot Pro</a>
        <a href="/" class="back">← Dashboard</a>
        <a href="/performance">📊 Performance</a>
        <a href="/settings">⚙️ Réglages</a>
    </nav>

    <div class="container">
        <div id="loading" class="loading">⏳ Chargement de l'analyse...</div>
        <div id="error" class="error" style="display:none"></div>
        <div id="content" style="display:none">

            <!-- HEADER -->
            <div class="trade-header">
                <div class="trade-title">
                    <span class="pair-name" id="h-pair">—</span>
                    <span class="direction-badge" id="h-dir">—</span>
                    <span class="status-badge" id="h-status">—</span>
                </div>
                <div class="trade-meta">
                    <div class="meta-item">
                        <div class="val" id="h-score">—</div>
                        <div class="lbl">Score ICT</div>
                    </div>
                    <div class="meta-item">
                        <div class="val" id="h-rr">—</div>
                        <div class="lbl">R:R</div>
                    </div>
                    <div class="meta-item">
                        <div class="val" id="h-tf">—</div>
                        <div class="lbl">Horizon</div>
                    </div>
                    <div class="meta-item">
                        <div class="val" id="h-pnl">—</div>
                        <div class="lbl">PnL pips</div>
                    </div>
                    <div class="meta-item">
                        <div class="val" id="h-opened">—</div>
                        <div class="lbl">Ouvert le</div>
                    </div>
                </div>
            </div>

            <!-- SCORES + PRIX -->
            <div class="grid2">

                <!-- SCORES LLM -->
                <div class="card">
                    <div class="card-title">🧠 Scores LLM (Claude Haiku)</div>
                    <div id="verdict-box"></div>
                    <div id="score-bars"></div>
                </div>

                <!-- PRIX -->
                <div class="card">
                    <div class="card-title">💰 Niveaux de Prix</div>
                    <div class="price-levels" id="price-levels"></div>
                </div>

            </div>

            <!-- NARRATIVE + CHECKLIST -->
            <div class="grid2">

                <div class="card">
                    <div class="card-title">📖 Narrative ICT</div>
                    <div class="narrative-text" id="narrative">—</div>
                </div>

                <div class="card">
                    <div class="card-title">✅ Checklist ICT</div>
                    <div id="checklist"></div>
                </div>

            </div>

            <!-- RED FLAGS -->
            <div class="card" id="red-flags-card" style="margin-top:20px; display:none">
                <div class="card-title">🚩 Red Flags Détectés</div>
                <div id="red-flags"></div>
            </div>

        </div>
    </div>

    <script>
        const orderId = window.location.pathname.split('/').pop();

        async function loadAnalysis() {
            try {
                const res = await fetch(`/api/analysis/${orderId}`);
                if (!res.ok) throw new Error('Trade introuvable');
                const o = await res.json();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                // ── HEADER ──
                document.getElementById('h-pair').textContent = o.pair || '—';
                const dirEl = document.getElementById('h-dir');
                dirEl.textContent = o.direction || '—';
                dirEl.className = `direction-badge ${(o.direction || '').toLowerCase()}`;

                const statusEl = document.getElementById('h-status');
                statusEl.textContent = (o.status || '—').toUpperCase();
                statusEl.className = `status-badge ${o.status || 'pending'}`;

                const score = o.score || 0;
                document.getElementById('h-score').textContent = `${score}/100`;
                document.getElementById('h-score').className = `val ${score >= 70 ? 'green' : score >= 50 ? '' : 'red'}`;
                document.getElementById('h-rr').textContent = `${o.rr || '—'}`;
                document.getElementById('h-tf').textContent = o.timeframe || '—';

                const pnl = o.pnl_pips || 0;
                const pnlEl = document.getElementById('h-pnl');
                pnlEl.textContent = `${pnl >= 0 ? '+' : ''}${pnl}`;
                pnlEl.className = `val ${pnl > 0 ? 'green' : pnl < 0 ? 'red' : ''}`;

                document.getElementById('h-opened').textContent = o.opened_at || '—';

                // ── NARRATIVE ──
                // Extraire les composantes de la narrative
                const narrative = o.narrative || '';

                // Parser les scores LLM depuis la narrative
                const scores = parseScoresFromNarrative(narrative);

                // Afficher le verdict
                renderVerdict(scores, narrative);

                // Afficher les score bars LLM
                renderScoreBars(scores);

                // Narrative texte propre (sans les lignes de score)
                const narrativeIct = extractNarrativeICT(narrative);
                document.getElementById('narrative').textContent = narrativeIct || narrative || 'Aucune narrative disponible.';

                // ── NIVEAUX DE PRIX ──
                document.getElementById('price-levels').innerHTML = `
            <div class="price-row entry">
                <span class="plabel">📍 Entrée</span>
                <span class="pvalue">${o.entry || '—'}</span>
            </div>
            <div class="price-row sl">
                <span class="plabel">🛑 Stop Loss</span>
                <span class="pvalue">${o.sl || '—'}</span>
            </div>
            <div class="price-row tp1">
                <span class="plabel">🎯 Take Profit 1</span>
                <span class="pvalue">${o.tp1 || '—'}</span>
            </div>
            ${o.tp2 ? `
            <div class="price-row tp2">
                <span class="plabel">🎯 Take Profit 2</span>
                <span class="pvalue">${o.tp2}</span>
            </div>` : ''}
            <div class="price-row rr">
                <span class="plabel">⚖️ Risk:Reward</span>
                <span class="pvalue">${o.rr || '—'}:1</span>
            </div>
            ${o.montant_risque ? `
            <div class="price-row" style="border-left: 3px solid #8b5cf6">
                <span class="plabel">💶 Montant risqué</span>
                <span class="pvalue">${o.montant_risque}€</span>
            </div>` : ''}
        `;

                // ── CHECKLIST ──
                const checklist = o.checklist || [];
                if (checklist.length > 0) {
                    document.getElementById('checklist').innerHTML = checklist.map(item => {
                        const isPass = item.status === 'pass' || item.status === 'ok';
                        const icon = isPass ? '✅' : '❌';
                        return `<div class="checklist-item">
                    <span class="check-icon">${icon}</span>
                    <span class="check-text">${item.item || item}</span>
                </div>`;
                    }).join('');
                } else {
                    document.getElementById('checklist').innerHTML =
                        '<div style="color:#475569; font-size:13px; padding:12px">Aucune checklist disponible</div>';
                }

                // ── RED FLAGS ──
                const redFlags = extractRedFlags(narrative);
                if (redFlags.length > 0) {
                    document.getElementById('red-flags-card').style.display = 'block';
                    document.getElementById('red-flags').innerHTML = redFlags.map(f =>
                        `<div class="red-flag">🚩 ${f}</div>`
                    ).join('');
                }

            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = '❌ ' + e.message;
            }
        }

        function parseScoresFromNarrative(narrative) {
            // Parser les scores depuis la narrative texte
            // Format: "Timing: 15/20 | Structure: 18/20 | Entrée: 12/20 | Cible: 14/20 | SMT: 10/20"
            const scores = { timing: 0, structure: 0, entree: 0, cible: 0, smt: 0, total: 0, verdict: null };

            const timingMatch = narrative.match(/Timing[:\s]+(\d+)\/20/i);
            const structureMatch = narrative.match(/Structure[:\s]+(\d+)\/20/i);
            const entreeMatch = narrative.match(/Entr[ée][e]?[:\s]+(\d+)\/20/i);
            const cibleMatch = narrative.match(/Cible[:\s]+(\d+)\/20/i);
            const smtMatch = narrative.match(/SMT[:\s]+(\d+)\/20/i);
            const totalMatch = narrative.match(/Score LLM[:\s]+(\d+)\/100/i);
            const verdictMatch = narrative.match(/Verdict[:\s]+(VALID[ÉE]|REJET[ÉE]|SKIP)/i);

            if (timingMatch) scores.timing = parseInt(timingMatch[1]);
            if (structureMatch) scores.structure = parseInt(structureMatch[1]);
            if (entreeMatch) scores.entree = parseInt(entreeMatch[1]);
            if (cibleMatch) scores.cible = parseInt(cibleMatch[1]);
            if (smtMatch) scores.smt = parseInt(smtMatch[1]);
            if (totalMatch) scores.total = parseInt(totalMatch[1]);
            if (verdictMatch) scores.verdict = verdictMatch[1].toUpperCase();

            return scores;
        }

        function renderVerdict(scores, narrative) {
            const box = document.getElementById('verdict-box');
            if (!scores.verdict) {
                box.innerHTML = '<div style="color:#475569; font-size:13px; margin-bottom:16px">Validation LLM non disponible</div>';
                return;
            }

            const isValidated = scores.verdict.includes('VALID');
            const isRejected = scores.verdict.includes('REJET');

            box.innerHTML = `
        <div class="verdict-box ${isValidated ? 'validated' : isRejected ? 'rejected' : 'skip'}">
            <span class="verdict-icon">${isValidated ? '✅' : isRejected ? '❌' : '⏭️'}</span>
            <div class="verdict-text">
                <div class="title ${isValidated ? 'green' : isRejected ? 'red' : 'gray'}">
                    ${isValidated ? 'VALIDÉ par Claude' : isRejected ? 'REJETÉ par Claude' : 'Non analysé'}
                </div>
                <div class="sub">Score LLM : ${scores.total}/100</div>
            </div>
        </div>`;
        }

        function renderScoreBars(scores) {
            const items = [
                { name: '⏰ Timing', val: scores.timing, max: 20 },
                { name: '🏗️ Structure', val: scores.structure, max: 20 },
                { name: '🎯 Entrée', val: scores.entree, max: 20 },
                { name: '📍 Cible DOL', val: scores.cible, max: 20 },
                { name: '🔄 SMT', val: scores.smt, max: 20 },
            ];

            if (items.every(i => i.val === 0)) {
                document.getElementById('score-bars').innerHTML =
                    '<div style="color:#475569; font-size:13px">Scores LLM non disponibles</div>';
                return;
            }

            document.getElementById('score-bars').innerHTML = items.map(item => {
                const pct = (item.val / item.max) * 100;
                const color = pct >= 70 ? 'high' : pct >= 40 ? 'medium' : 'low';
                return `
        <div class="score-item">
            <div class="score-header">
                <span class="score-name">${item.name}</span>
                <span class="score-val">${item.val}/${item.max}</span>
            </div>
            <div class="score-bar">
                <div class="score-fill ${color}" style="width:${pct}%"></div>
            </div>
        </div>`;
            }).join('');
        }

        function extractNarrativeICT(narrative) {
            // Extraire uniquement la narrative ICT (après "Narrative ICT:")
            const match = narrative.match(/Narrative ICT[:\s]+(.+?)(?:\nRed Flags:|$)/is);
            return match ? match[1].trim() : null;
        }

        function extractRedFlags(narrative) {
            // Extraire les red flags depuis la narrative
            const match = narrative.match(/Red Flags[:\s]+(.+?)(?:\nCoût:|$)/is);
            if (!match) return [];
            return match[1].split(',').map(f => f.trim()).filter(Boolean);
        }

        loadAnalysis();
    </script>
</body>

</html>
