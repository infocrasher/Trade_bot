<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Dashboard TakeOption{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
          <polyline points="16 7 22 7 22 13"></polyline>
        </svg>
      </div>
      <span class="brand-name">TakeOption</span>
    </div>

    <nav class="sidebar-nav">
      <a href="{{ url_for('index') }}" class="nav-item {% if request.endpoint == 'index' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span>Dashboard</span>
      </a>
      <a href="{{ url_for('page_performance') }}" class="nav-item {% if request.endpoint == 'page_performance' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"></line>
          <line x1="12" y1="20" x2="12" y2="4"></line>
          <line x1="6" y1="20" x2="6" y2="14"></line>
        </svg>
        <span>Performance</span>
      </a>
      <a href="{{ url_for('page_settings') }}" class="nav-item {% if request.endpoint == 'page_settings' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"></path>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2"></path>
        </svg>
        <span>Réglages</span>
      </a>
      <a href="{{ url_for('page_postmortem') }}" class="nav-item {% if request.endpoint == 'page_postmortem' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <span>Post-Mortem</span>
      </a>
      <a href="{{ url_for('page_journal') }}" class="nav-item {% if request.endpoint == 'page_journal' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
        </svg>
        <span>Journal IA</span>
      </a>
      <a href="{{ url_for('page_backtest') }}" class="nav-item {% if request.endpoint == 'page_backtest' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
          <polyline points="16 7 22 7 22 13"></polyline>
        </svg>
        <span>Backtest</span>
      </a>
      <a href="{{ url_for('page_logs') }}" class="nav-item {% if request.endpoint == 'page_logs' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line>
        </svg>
        <span>Logs</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="bot-status-sidebar">
        <span class="status-dot" id="sidebar-status-dot"></span>
        <span class="status-label" id="sidebar-status-label">En cours</span>
      </div>
      <div class="sidebar-version">v2.4.1</div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-wrapper">
    <!-- Top Header -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
      </div>
      <div class="topbar-right">
        <div class="topbar-time" id="topbar-time"></div>
        <div class="topbar-pairs">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6"></path><path d="M23 20v-6h-6"></path>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
          </svg>
          <span id="topbar-pairs-count">14 paires actives</span>
        </div>
        <div class="bot-status-badge" id="topbar-bot-status">
          <span class="status-dot running"></span>
          <span>En cours</span>
        </div>
        <!-- Boutons de contrôle -->
        <div style="display:flex;gap:6px;margin-left:10px;">
          <button id="btn-bot-start"
            style="display:none;align-items:center;gap:4px;padding:5px 10px;background:rgba(16,185,129,0.15);border:1px solid #10B981;border-radius:6px;color:#10B981;font-size:11px;font-weight:700;cursor:pointer;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            Démarrer
          </button>
          <button id="btn-bot-pause"
            style="display:none;align-items:center;gap:4px;padding:5px 10px;background:rgba(251,191,36,0.15);border:1px solid #FBBF24;border-radius:6px;color:#FBBF24;font-size:11px;font-weight:700;cursor:pointer;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            Pause
          </button>
          <button id="btn-bot-stop"
            style="display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:rgba(239,68,68,0.15);border:1px solid #EF4444;border-radius:6px;color:#EF4444;font-size:11px;font-weight:700;cursor:pointer;">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
            Arrêter
          </button>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
